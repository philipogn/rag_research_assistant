services:
  ollama:
    image: ollama/ollama:latest
    entrypoint: >
      /bin/sh -c "
        ollama serve &
        until ollama list > /dev/null 2>&1; do sleep 1; done &&
        for model in llama3.2 nomic-embed-text; do
          if ollama list | grep -q \"$$model\"; then
            echo \"$$model already present, skipping pull\";
          else
            echo \"$$model not found, pulling...\";
            ollama pull \"$$model\";
          fi
        done &&
        wait
      "
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q llama3.2 && ollama list | grep -q nomic-embed-text || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - 11434:11434
    volumes:
      - ollama_data:/root/.ollama

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    depends_on:
      ollama:
        condition: service_healthy
      rag-bridge:
        condition: service_healthy
    ports:
      - 8080:8080
    environment:
      OLLAMA_BASE_URL: http://rag-bridge:8888
    volumes:
      - webui_data:/app/backend/data

  rag-bridge:
    build:
      context: .
      dockerfile: src/Dockerfile
    depends_on:
      ollama:
        condition: service_healthy
      chromadb:
        condition: service_started
    ports:
      - 8888:8888
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/api/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - 8000:8000
    environment:
      ANONYMIZED_TELEMETRY: "false"
      IS_PERSISTENT: "true"
    volumes:
      - chroma_data:/chroma/chroma

  python:
    image: python:3.11-slim
    profiles:
      - python
    volumes:
      - .:/app
      - python_packages:/usr/local/lib/python3.11/site-packages
    working_dir: /app

volumes:
  ollama_data:
  webui_data:
  chroma_data:
  python_packages: